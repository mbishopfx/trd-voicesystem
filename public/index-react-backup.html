<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>True Rank Dialer OS</title>
    <link rel="stylesheet" href="./tailwind.css" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap");

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: radial-gradient(circle at 15% 10%, rgba(45, 226, 183, 0.15), transparent 35%),
          radial-gradient(circle at 85% 5%, rgba(18, 194, 233, 0.2), transparent 30%),
          linear-gradient(150deg, #08141f 0%, #0f1f2d 45%, #12263a 100%);
        color: #e6f2ff;
        font-family: "IBM Plex Sans", system-ui, sans-serif;
      }

      #app {
        min-height: 100vh;
      }

      .font-display {
        font-family: "Sora", sans-serif;
      }

      .glass {
        background: linear-gradient(160deg, rgba(13, 28, 41, 0.78), rgba(10, 22, 34, 0.68));
        backdrop-filter: blur(12px);
        border: 1px solid rgba(160, 214, 255, 0.18);
      }

      .pill {
        border: 1px solid rgba(160, 214, 255, 0.28);
        background: rgba(15, 38, 55, 0.46);
      }

      .scroll-dark {
        scrollbar-width: thin;
        scrollbar-color: rgba(160, 214, 255, 0.35) transparent;
      }

      .scroll-dark::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }

      .scroll-dark::-webkit-scrollbar-thumb {
        background: rgba(160, 214, 255, 0.3);
        border-radius: 999px;
      }

      .backdrop {
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image: linear-gradient(rgba(160, 214, 255, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(160, 214, 255, 0.05) 1px, transparent 1px);
        background-size: 28px 28px;
        opacity: 0.35;
        mask-image: radial-gradient(circle at 50% 28%, black 20%, transparent 70%);
      }
    </style>
  </head>
  <body>
    <div class="backdrop"></div>
    <div id="app"></div>

    <script type="module">
      import React, { useCallback, useEffect, useMemo, useState } from "https://esm.sh/react@18.3.1";
      import { createRoot } from "https://esm.sh/react-dom@18.3.1/client";
      import htm from "https://esm.sh/htm@3.1.1";

      const html = htm.bind(React.createElement);

      async function readFile(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onerror = () => reject(new Error(`Failed to read ${file.name}`));
          reader.onload = () => resolve(String(reader.result || ""));
          reader.readAsText(file);
        });
      }

      async function getJson(url) {
        const res = await fetch(url);
        const data = await res.json().catch(() => ({}));
        if (!res.ok || data.ok === false) {
          throw new Error(data.error || `Request failed (${res.status})`);
        }
        return data;
      }

      async function postJson(url, body = {}) {
        const res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || data.ok === false) {
          throw new Error(data.error || `Request failed (${res.status})`);
        }
        return data;
      }

      function dt(value) {
        if (!value) return "-";
        const ts = Date.parse(value);
        if (!Number.isFinite(ts)) return value;
        return new Date(ts).toLocaleString();
      }

      function toLines(text) {
        return String(text || "")
          .split("\n")
          .map((line) => line.trim())
          .filter(Boolean);
      }

      function toRebuttals(text) {
        return String(text || "")
          .split("\n")
          .map((line) => line.trim())
          .filter(Boolean)
          .map((line) => {
            const parts = line.split("=>");
            if (parts.length < 2) return null;
            const objection = parts[0].trim();
            const response = parts.slice(1).join("=>").trim();
            if (!objection || !response) return null;
            return { objection, response };
          })
          .filter(Boolean);
      }

      function extractCallId(text) {
        const raw = String(text || "");
        const match = raw.match(/\b[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\b/i);
        return match ? match[0] : "";
      }

      function StatCard({ title, value, hint }) {
        return html`
          <div className="glass rounded-2xl p-4 shadow-xl transition-transform hover:-translate-y-0.5">
            <div className="text-xs uppercase tracking-[0.14em] text-slate-300">${title}</div>
            <div className="font-display mt-2 text-3xl font-semibold text-cyan-100">${value}</div>
            <div className="mt-1 text-xs text-slate-400">${hint}</div>
          </div>
        `;
      }

      const TONE_PRESETS = {
        professional: {
          persona: "Senior outbound specialist with executive presence",
          tone: "Calm, credible, concise, and respectful. Sound like a trusted advisor."
        },
        consultative: {
          persona: "Consultative growth advisor",
          tone: "Curious, diagnostic, and practical. Ask short questions and educate briefly."
        },
        energetic: {
          persona: "High-energy opportunity scout",
          tone: "Upbeat, friendly, and concise while staying professional and non-pushy."
        }
      };

      function App() {
        const [view, setView] = useState("campaign");
        const [status, setStatus] = useState(null);
        const [calls, setCalls] = useState([]);
        const [callLoading, setCallLoading] = useState(false);
        const [callQuery, setCallQuery] = useState("");
        const [callSelected, setCallSelected] = useState(null);

        const [logs, setLogs] = useState([]);
        const [logScope, setLogScope] = useState("all");
        const [logAuto, setLogAuto] = useState(true);
        const [logAfterTs, setLogAfterTs] = useState(0);

        const [files, setFiles] = useState([]);
        const [busy, setBusy] = useState(false);
        const [ingestResult, setIngestResult] = useState(null);
        const [message, setMessage] = useState("");
        const [error, setError] = useState("");
        const [wizardLoading, setWizardLoading] = useState(false);
        const [wizardStep, setWizardStep] = useState(1);
        const [wizardResult, setWizardResult] = useState(null);
        const [templates, setTemplates] = useState([]);
        const [phoneNumbers, setPhoneNumbers] = useState([]);
        const [wizard, setWizard] = useState({
          sourceTemplateId: "",
          agentName: "TRD Growth Concierge",
          templateName: "TRD Growth Concierge Template",
          voiceProfile: "female",
          tonePreset: "professional",
          toneInstructions: "Calm, credible, helpful, and concise. Never pushy.",
          industry: "B2B services",
          objective: "Get attention and book a free AI Search Dominance strategy meeting.",
          offerSummary: "We identify where revenue is being lost due to low AI search visibility and disconnected tools.",
          openingScript:
            "Hi {{leadFirstName}}, this is True Rank Digital. We found an AI search visibility gap for {{leadCompany}} and wanted to offer a free strategy review.",
          cta: "Offer two meeting windows and send booking link right away.",
          followUpFallback: "If they cannot book now, ask best contact channel and preferred follow-up window.",
          knowledgeBaseText:
            "True Rank Digital specializes in AI search optimization and visibility dominance.\\nThe meeting is free and focused on exposing lost revenue from disconnected tools and weak AI visibility.\\nOur team is Google-certified and can streamline marketing + CRM workflows end-to-end.",
          valuePointsText:
            "We map where your business is underrepresented in AI-powered search experiences.\\nWe show practical quick-win changes that improve visibility without a full rebuild.",
          allowedTopicsText: "AI search optimization\\nvisibility findings\\nmeeting logistics\\nhigh-level fit",
          forbiddenTopicsText: "politics\\nmedical advice\\nlegal advice\\noff-topic technical consulting",
          rebuttalsText:
            "Not interested => Totally fair. This is a free review to show where money is leaking today from AI visibility gaps, then you decide if any action is worth it.\\nSend email => Absolutely. I can send a short summary, and the free walkthrough helps our Google-certified team prioritize what to fix first so you are not guessing.",
          phoneNumberId: ""
        });

        const runtime = status?.runtime || {};
        const queue = status?.queue || { byStatus: {} };

        const loadStatus = useCallback(async () => {
          const data = await getJson("/api/dialer/status");
          setStatus(data);
        }, []);

        const loadCalls = useCallback(
          async (queryOverride) => {
            setCallLoading(true);
            try {
              const q = typeof queryOverride === "string" ? queryOverride : callQuery;
              const url = new URL(window.location.origin + "/api/calls");
              url.searchParams.set("limit", "500");
              if (q.trim()) url.searchParams.set("q", q.trim());
              const data = await getJson(url.pathname + url.search);
              setCalls(data.calls || []);
            } finally {
              setCallLoading(false);
            }
          },
          [callQuery]
        );

        const loadLogs = useCallback(
          async (incremental = true) => {
            const url = new URL(window.location.origin + "/api/logs/worker");
            url.searchParams.set("limit", "500");
            if (logScope !== "all") url.searchParams.set("scope", logScope);
            if (incremental && logAfterTs > 0) url.searchParams.set("afterTs", String(logAfterTs));

            const data = await getJson(url.pathname + url.search);
            const rows = data.logs || [];

            if (incremental && logAfterTs > 0) {
              if (rows.length > 0) {
                setLogs((prev) => [...prev, ...rows].slice(-3000));
              }
            } else {
              setLogs(rows);
            }

            if (typeof data.latestTs === "number") {
              setLogAfterTs(data.latestTs);
            }
          },
          [logAfterTs, logScope]
        );

        const loadCallDetail = useCallback(async (leadId) => {
          const data = await getJson(`/api/calls/${encodeURIComponent(leadId)}`);
          setCallSelected(data.call || null);
        }, []);

        const hydrateWizardFromTemplate = useCallback((template) => {
          if (!template) return;
          setWizard((prev) => ({
            ...prev,
            sourceTemplateId: template.id || prev.sourceTemplateId,
            templateName: `${template.name || "Agent"} Copy`,
            voiceProfile: template.voiceProfile === "male" || template.voiceProfile === "female" ? template.voiceProfile : prev.voiceProfile,
            industry: template.industry || prev.industry,
            objective: template.objective || prev.objective,
            offerSummary: template.offerSummary || prev.offerSummary,
            openingScript: template.openingScript || prev.openingScript,
            cta: template.cta || prev.cta,
            followUpFallback: template.followUpFallback || prev.followUpFallback,
            knowledgeBaseText: Array.isArray(template.knowledgeBase) ? template.knowledgeBase.join("\n") : prev.knowledgeBaseText,
            valuePointsText: Array.isArray(template.valuePoints) ? template.valuePoints.join("\n") : prev.valuePointsText,
            allowedTopicsText: Array.isArray(template.allowedTopics) ? template.allowedTopics.join("\n") : prev.allowedTopicsText,
            forbiddenTopicsText: Array.isArray(template.forbiddenTopics) ? template.forbiddenTopics.join("\n") : prev.forbiddenTopicsText,
            rebuttalsText: Array.isArray(template.rebuttals)
              ? template.rebuttals
                  .map((r) => `${r.objection || ""} => ${r.response || ""}`)
                  .filter((line) => line.trim() !== "=>")
                  .join("\n")
              : prev.rebuttalsText
          }));
        }, []);

        const loadWizardDependencies = useCallback(async () => {
          setWizardLoading(true);
          try {
            const [tplRes, phoneRes] = await Promise.all([getJson("/api/templates"), getJson("/api/vapi/phone-numbers")]);
            const templateRows = tplRes.templates || [];
            const phoneRows = phoneRes.phoneNumbers || [];
            setTemplates(templateRows);
            setPhoneNumbers(phoneRows);

            const activeTemplate = templateRows.find((tpl) => tpl.id === tplRes.activeTemplateId) || templateRows[0];
            setWizard((prev) => ({
              ...prev,
              sourceTemplateId: prev.sourceTemplateId || activeTemplate?.id || "",
              phoneNumberId: prev.phoneNumberId || phoneRows[0]?.id || ""
            }));
            if (activeTemplate) hydrateWizardFromTemplate(activeTemplate);
          } finally {
            setWizardLoading(false);
          }
        }, [hydrateWizardFromTemplate]);

        const applyTonePreset = useCallback((presetKey) => {
          const preset = TONE_PRESETS[presetKey] || TONE_PRESETS.professional;
          setWizard((prev) => ({
            ...prev,
            tonePreset: presetKey,
            toneInstructions: preset.tone
          }));
        }, []);

        const createAgentFromWizard = useCallback(async () => {
          if (!wizard.phoneNumberId) {
            setError("Select a Twilio/Vapi phone number before creating the agent.");
            return;
          }
          if (!wizard.agentName.trim()) {
            setError("Enter an agent name.");
            return;
          }

          setWizardLoading(true);
          setError("");
          setMessage("Creating onboarding template and provisioning assistant...");
          setWizardResult(null);

          try {
            const createTpl = await postJson("/api/templates/create-default", {
              name: wizard.templateName || `${wizard.agentName} Template`
            });
            const newTemplate = createTpl.template;
            const sourceTemplate = templates.find((tpl) => tpl.id === wizard.sourceTemplateId) || newTemplate;
            const preset = TONE_PRESETS[wizard.tonePreset] || TONE_PRESETS.professional;

            const composedTemplate = {
              ...sourceTemplate,
              ...newTemplate,
              name: wizard.templateName || `${wizard.agentName} Template`,
              description: `Onboarding wizard template for ${wizard.agentName}`,
              voiceProfile: wizard.voiceProfile,
              industry: wizard.industry,
              persona: `${preset.persona}. ${wizard.toneInstructions}`.trim(),
              objective: wizard.objective,
              offerSummary: wizard.offerSummary,
              openingScript: wizard.openingScript,
              cta: wizard.cta,
              followUpFallback: wizard.followUpFallback,
              knowledgeBase: toLines(wizard.knowledgeBaseText),
              valuePoints: toLines(wizard.valuePointsText),
              allowedTopics: toLines(wizard.allowedTopicsText),
              forbiddenTopics: toLines(wizard.forbiddenTopicsText),
              rebuttals: toRebuttals(wizard.rebuttalsText)
            };

            await postJson("/api/templates/save", { template: composedTemplate });

            const created = await postJson("/api/vapi/create-additional-agent", {
              templateId: composedTemplate.id,
              assistantName: wizard.agentName,
              phoneNumberId: wizard.phoneNumberId
            });

            setWizardResult({
              templateId: composedTemplate.id,
              templateName: composedTemplate.name,
              assistantId: created.assistantId,
              assistantName: created.assistantName || wizard.agentName,
              phoneNumberId: wizard.phoneNumberId,
              phoneNumber: created.phoneNumber?.number || ""
            });
            setMessage(`Agent ${created.assistantName || wizard.agentName} created and phone number assigned.`);
            setWizardStep(4);
            await loadWizardDependencies();
          } catch (e) {
            setError(String(e));
          } finally {
            setWizardLoading(false);
          }
        }, [wizard, templates, loadWizardDependencies]);

        useEffect(() => {
          Promise.all([loadStatus(), loadCalls(""), loadLogs(false)]).catch((e) => setError(String(e)));
        }, []);

        useEffect(() => {
          const timer = setInterval(() => {
            loadStatus().catch(() => {});
          }, 7000);
          return () => clearInterval(timer);
        }, [loadStatus]);

        useEffect(() => {
          if (!logAuto) return;
          const timer = setInterval(() => {
            loadLogs(true).catch(() => {});
          }, 5000);
          return () => clearInterval(timer);
        }, [logAuto, loadLogs]);

        useEffect(() => {
          setLogAfterTs(0);
          loadLogs(false).catch((e) => setError(String(e)));
        }, [logScope]);

        useEffect(() => {
          if (view !== "agentWizard") return;
          loadWizardDependencies().catch((e) => setError(String(e)));
        }, [view, loadWizardDependencies]);

        const runIngestOnly = useCallback(async () => {
          setBusy(true);
          setError("");
          setMessage("Running ingest...");
          try {
            const data = await postJson("/api/ingest/run", {});
            setIngestResult(data);
            setMessage(`Ingest complete. files=${(data.summaries || []).length}`);
            await loadStatus();
            await loadCalls();
          } catch (e) {
            setError(String(e));
          } finally {
            setBusy(false);
          }
        }, [loadStatus, loadCalls]);

        const uploadAndIngest = useCallback(async () => {
          if (files.length === 0) {
            setError("Select at least one CSV file.");
            return;
          }

          setBusy(true);
          setError("");
          setMessage(`Uploading ${files.length} file(s)...`);

          try {
            const payloadFiles = [];
            for (const file of files) {
              payloadFiles.push({ fileName: file.name, csvContent: await readFile(file) });
            }
            const data = await postJson("/api/ingest/upload", { files: payloadFiles, runIngest: true });
            setIngestResult(data);
            const accepted = (data.ingest?.summaries || []).reduce((sum, row) => sum + (row.accepted || 0), 0);
            setMessage(`Upload complete. accepted=${accepted}`);
            setFiles([]);
            const input = document.getElementById("csv-input");
            if (input) input.value = "";
            await loadStatus();
            await loadCalls();
          } catch (e) {
            setError(String(e));
          } finally {
            setBusy(false);
          }
        }, [files, loadStatus, loadCalls]);

        const resetStuck = useCallback(async () => {
          setError("");
          setMessage("Resetting stale dialing leads...");
          try {
            const data = await postJson("/api/dialer/reset-stuck", { thresholdSeconds: 180 });
            setMessage(`Reset complete. reset=${data.result?.reset || 0}, failed=${data.result?.failed || 0}`);
            await loadStatus();
            await loadCalls();
            await loadLogs(true);
          } catch (e) {
            setError(String(e));
          }
        }, [loadStatus, loadCalls, loadLogs]);

        const exportLogs = useCallback(() => {
          const blob = new Blob([JSON.stringify(logs, null, 2)], { type: "application/json" });
          const href = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = href;
          a.download = `runtime-logs-${new Date().toISOString().replace(/[:.]/g, "-")}.json`;
          a.click();
          URL.revokeObjectURL(href);
        }, [logs]);

        const navItems = [
          { id: "campaign", label: "Campaign Run" },
          { id: "agentWizard", label: "Agent Onboarding" },
          { id: "logs", label: "Live Logs" },
          { id: "calls", label: "Calls & Media" }
        ];

        const runState = useMemo(() => {
          const byStatus = queue.byStatus || {};
          const active = (byStatus.queued || 0) + (byStatus.retry || 0) + (byStatus.dialing || 0);
          return active > 0 ? "Campaign Active" : "No Active Queue";
        }, [queue]);

        return html`
          <div className="relative z-10 p-4 md:p-6">
            <div className="mx-auto max-w-7xl">
              <header className="glass rounded-3xl p-5 shadow-2xl">
                <div className="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
                  <div>
                    <div className="pill inline-flex items-center rounded-full px-3 py-1 text-xs uppercase tracking-[0.14em] text-cyan-100">
                      True Rank Digital
                    </div>
                    <h1 className="font-display mt-3 text-2xl md:text-4xl font-semibold text-slate-50">Dialer Command Center</h1>
                    <p className="mt-2 text-sm text-slate-300">Campaign control, full logs, transcripts, and call audio in one place.</p>
                  </div>
                  <div className="pill rounded-xl px-3 py-2 text-sm text-cyan-100">${runState} · dueNow=${queue.dueNow || 0}</div>
                </div>
              </header>

              <div className="mt-5 grid grid-cols-1 gap-4 xl:grid-cols-[250px_1fr]">
                <aside className="glass rounded-2xl p-4 shadow-xl">
                  <div className="text-xs uppercase tracking-[0.14em] text-slate-400">Workspace</div>
                  <div className="mt-3 space-y-2">
                    ${navItems.map((item) => {
                      const active = item.id === view;
                      return html`
                        <button
                          key=${item.id}
                          onClick=${() => setView(item.id)}
                          className=${`w-full rounded-xl border px-3 py-2 text-left text-sm transition ${
                            active
                              ? "border-cyan-300/40 bg-cyan-500/15 text-cyan-100"
                              : "border-slate-300/15 bg-slate-900/35 text-slate-200 hover:bg-slate-800/45"
                          }`}
                        >
                          ${item.label}
                        </button>
                      `;
                    })}
                  </div>

                  <div className="mt-4 space-y-2">
                    <button onClick=${() => loadStatus().catch((e) => setError(String(e)))} className="w-full rounded-xl border border-slate-300/20 bg-slate-900/45 px-3 py-2 text-sm">
                      Refresh Status
                    </button>
                    <button onClick=${resetStuck} className="w-full rounded-xl border border-amber-300/30 bg-amber-500/15 px-3 py-2 text-sm text-amber-100">
                      Reset Stuck Dialing
                    </button>
                    <a href="/dashboard/legacy-dashboard.html" className="block text-center rounded-xl border border-slate-300/20 px-3 py-2 text-sm text-slate-300">
                      Legacy Console
                    </a>
                  </div>
                </aside>

                <main className="space-y-4">
                  <section className="grid grid-cols-2 gap-3 md:grid-cols-4">
                    <${StatCard} title="Total" value=${queue.totalLeads || 0} hint="All leads in state" />
                    <${StatCard} title="Queued" value=${(queue.byStatus || {}).queued || 0} hint="Ready to dial" />
                    <${StatCard} title="Dialing" value=${(queue.byStatus || {}).dialing || 0} hint="In progress" />
                    <${StatCard} title="Booked" value=${(queue.byStatus || {}).booked || 0} hint="Wins" />
                  </section>

                  ${message
                    ? html`<div className="rounded-xl border border-emerald-300/30 bg-emerald-500/15 px-4 py-3 text-sm text-emerald-100">${message}</div>`
                    : null}
                  ${error
                    ? html`<div className="rounded-xl border border-rose-300/30 bg-rose-500/15 px-4 py-3 text-sm text-rose-100">${error}</div>`
                    : null}

                  ${view === "campaign"
                    ? html`
                        <section className="grid grid-cols-1 gap-4 lg:grid-cols-2">
                          <div className="glass rounded-2xl p-5 shadow-xl">
                            <h2 className="font-display text-xl text-slate-50">CSV Upload + GO</h2>
                            <p className="mt-1 text-sm text-slate-300">Upload CSV files and run immediate ingest + queueing.</p>

                            <label className="mt-4 block text-xs uppercase tracking-[0.14em] text-slate-400">CSV Files</label>
                            <input
                              id="csv-input"
                              type="file"
                              accept=".csv,text/csv"
                              multiple
                              onChange=${(e) => setFiles(Array.from(e.target.files || []))}
                              className="mt-2 w-full rounded-xl border border-slate-300/20 bg-slate-900/45 px-3 py-2 text-sm"
                            />
                            <div className="mt-2 text-xs text-slate-400">Selected: ${files.length}</div>

                            <div className="mt-4 flex flex-wrap gap-2">
                              <button onClick=${uploadAndIngest} disabled=${busy} className="rounded-xl border border-cyan-300/35 bg-cyan-500/18 px-4 py-2 text-sm text-cyan-100 disabled:opacity-50">
                                ${busy ? "Working..." : "Upload + Ingest + GO"}
                              </button>
                              <button onClick=${runIngestOnly} disabled=${busy} className="rounded-xl border border-slate-300/20 bg-slate-900/45 px-4 py-2 text-sm disabled:opacity-50">
                                Run Ingest Only
                              </button>
                            </div>
                          </div>

                          <div className="glass rounded-2xl p-5 shadow-xl">
                            <h2 className="font-display text-xl text-slate-50">Runtime</h2>
                            <div className="mt-3 grid grid-cols-2 gap-3 text-sm">
                              <div className="rounded-xl bg-slate-900/45 p-3">
                                <div className="text-xs uppercase text-slate-400">Dialer</div>
                                <div className="mt-1">${runtime.dialerActive ? "online" : "offline"}</div>
                              </div>
                              <div className="rounded-xl bg-slate-900/45 p-3">
                                <div className="text-xs uppercase text-slate-400">Post-call Delay</div>
                                <div className="mt-1">${runtime.postCallDelaySeconds || 0}s</div>
                              </div>
                              <div className="rounded-xl bg-slate-900/45 p-3">
                                <div className="text-xs uppercase text-slate-400">Trust Imports</div>

                        <pre className="scroll-dark mt-2 max-h-[70vh] overflow-auto whitespace-pre-wrap break-words text-sm text-slate-100">${
                          callSelected.transcript || "No transcript available for this call."
                        }</pre>
                      </div>
                    </div>
                  </div>
                `
              : null}
          </div>
        `;
      }

      createRoot(document.getElementById("app")).render(html`<${App} />`);
    </script>
  </body>
</html>
